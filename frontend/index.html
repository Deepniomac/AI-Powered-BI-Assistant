<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Business Intelligence Assistant landing page. Securely access executive summaries, trend analysis, and KPI tracking.">
    <title>AI Business Intelligence Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card p-5 text-center" style="max-width: 600px; width: 100%;">

                <i class="bi bi-cpu-fill text-gradient" style="font-size: 3.5rem;"></i>

            <div class="my-4 border-top border-secondary opacity-25"></div>

            <div class="mt-4 d-grid gap-3 d-sm-flex justify-content-sm-center">

                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </a>
                <a id="btn-landing-register" href="register.html" class="btn btn-outline-light px-4 py-2" style="border-radius: 10px; border-color: rgba(255,255,255,0.15);">
