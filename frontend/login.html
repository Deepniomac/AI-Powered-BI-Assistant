<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure portal to sign in to the AI Business Intelligence Assistant.">
    <title>Sign In - AI BI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card shadow-lg">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-gradient" style="font-size: 2.5rem;"></i>
                <h2 class="text-gradient mt-2">Welcome Back</h2>
                <p class="text-muted">Sign in to your analytical dashboard</p>
            </div>
            
            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-bold">Username or Email</label>
                    <input type="text" id="username" class="form-control form-control-custom" placeholder="Enter username or email" required autocomplete="username">
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label small fw-bold">Password</label>
                    <input type="password" id="password" class="form-control form-control-custom" placeholder="Enter password" required autocomplete="current-password">
                </div>
                
                <div class="d-grid mb-3">
                    <button id="btn-login-submit" type="submit" class="btn btn-gradient py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-3 small">
                <span class="text-muted">Don't have an account?</span>
                <a id="link-goto-register" href="register.html" class="text-gradient fw-bold ms-1 text-decoration-none">Create one</a>
            </div>
            <div class="text-center mt-2 small">
                <a href="index.html" class="text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
            </div>
        </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
